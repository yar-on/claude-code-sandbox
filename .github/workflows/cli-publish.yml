name: Build and Publish CLI to npm

on:
  push:
    tags: ['cli-v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#cli-v}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run cli:lint

      - name: Build
        run: npm run cli:build

      - name: Test
        run: npm run cli:test

      - name: Set version in package.json
        run: |
          cd apps/cli
          npm version ${{ steps.version.outputs.version }} --no-git-tag-version --allow-same-version

      - name: Publish to npm
        run: npm publish --access public
        working-directory: apps/cli

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: cli-v${{ steps.version.outputs.version }}
          name: CLI v${{ steps.version.outputs.version }}
          body: |
            `@claude-code-sandbox/cli` v${{ steps.version.outputs.version }} published to npm.

            ```
            npm install -g @claude-code-sandbox/cli
            claude-code-sandbox --version
            ```
